<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>OG Image — Minary</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@500;600;700&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      width: 1200px;
      height: 630px;
      overflow: hidden;
      background: #0a160f; 
      font-family: 'Inter', sans-serif; 
      -webkit-font-smoothing: antialiased; 
    }

    .bg {
      position: absolute; inset: 0;
      background:
        radial-gradient(900px 600px at 80% -10%, rgba(82,180,122,0.22), transparent 55%),
        radial-gradient(700px 500px at -5% 110%, rgba(45,106,79,0.28), transparent 55%),
        linear-gradient(160deg, #0a160f 0%, #0d1a13 50%, #122a1e 100%);
    }

    /* Grid */
    .grid {
      position: absolute; inset: 0;
      background-image:
        linear-gradient(rgba(82,180,122,0.05) 1px, transparent 1px),
        linear-gradient(90deg, rgba(82,180,122,0.05) 1px, transparent 1px);
      background-size: 52px 52px;
      mask-image: radial-gradient(120% 90% at 50% 0%, black, transparent 75%);
      -webkit-mask-image: radial-gradient(120% 90% at 50% 0%, black, transparent 75%);
    }

    .content {
      position: relative; z-index: 1;
      width: 100%; height: 100%;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: flex-start;
      padding: 72px 96px;
      gap: 0;
    }

    .logo {
      position: absolute;
      top: 48px; left: 96px;
      height: 88px;
    }

    .tagline {
      font-family: 'Inter', sans-serif;
      font-size: 15px; font-weight: 600;
      letter-spacing: 0.12em; text-transform: uppercase;
      color: rgba(116,215,154,0.7);
      margin-bottom: 22px;
    }

    h1 {
      font-family: 'Inter', sans-serif;
      font-weight: 700;
      font-size: 62px;
      line-height: 1.08;
      letter-spacing: -0.03em;
      color: #fff;
      margin-bottom: 28px;
      max-width: 22ch;
    }

    h1 .grad {
      background: linear-gradient(105deg, #74d79a, #52b47a 55%, #9fe3b8);
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
    }

    .sub {
      font-size: 20px;
      font-weight: 500;
      color: rgba(255,255,255,0.55);
      line-height: 1.6;
      max-width: 48ch;
    }

    .pill {
      position: absolute;
      bottom: 52px; left: 96px;
      display: flex; align-items: center; gap: 8px;
      padding: 8px 16px; border-radius: 100px;
      border: 1px solid rgba(82,180,122,0.3);
      background: rgba(82,180,122,0.08);
      font-size: 13px; font-weight: 600;
      color: #74d79a; letter-spacing: 0.02em;
    }

    .dot {
      width: 7px; height: 7px; border-radius: 50%;
      background: #74d79a;
    }

    .url {
      position: absolute;
      bottom: 56px; right: 96px;
      font-size: 16px; font-weight: 600;
      color: rgba(255,255,255,0.28);
      letter-spacing: 0.01em;
    }
  </style>
</head>
<body>
  <div class="bg"></div>
  <div class="grid"></div>

  <div class="content">
    <img src="public/logo.png" alt="Minary" class="logo">

    <h1>Stop deciding what to work on.<br><span class="grad">Start working.</span></h1>

    <p class="sub">An AI workspace that helps solo builders decide, prioritize, and make progress.</p>

    <div class="pill">
      <span class="dot"></span>
      Join the waitlist
    </div>

    <span class="url">minary.app</span>
  </div>
</body>
</html>
